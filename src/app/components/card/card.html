    <div class="card shadow-sm match-card">
        <img src="{{ disciplineImg }}" class="match-image card-img-top" alt="Imagen del partido">
        <div class="card-body d-flex flex-column">
            <h4 class="card-title fw-bold card-title">{{ match?.title }}</h4>
            <p class="mb-3">{{ match?.discipline }}</p>

            <div class="mb-3">
                <p class="mb-1">👥 1 / 20 jugadores</p>
                <p class="mb-1">📍 {{ match?.location }}</p>
                <p class="mb-1">🕒 {{ match?.scheduledAt| date:'dd/MM/yyyy HH:mm' }}</p>
                <p class="mb-0">👤 {{ match?.user }}</p>
            </div>

            <button class="btn btn-primary mt-auto">Detalles</button>
        </div>
    </div>
